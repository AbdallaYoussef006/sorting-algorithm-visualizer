<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorting Algorithm Visualizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">

        <header class="header">
            <div class="logo">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                    <path d="M3 6h16M3 11h10M3 16h6" stroke="#00d4ff" stroke-width="2.5" stroke-linecap="round"/>
                    <path d="M17 14l3 3-3 3" stroke="#cc44ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1>Sorting Algorithm Visualizer</h1>
        </header>

        <div class="main">

            <aside class="sidebar">
                <div class="section">
                    <label class="section-label">Select Algorithm</label>
                    <select id="algorithm-select" class="select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                    </select>
                </div>

                <div class="section">
                    <label class="section-label">Controls</label>
                    <div class="controls-group">
                        <button id="btn-play" class="btn btn-primary">
                            <span id="play-icon">▶</span> <span id="play-text">Play</span>
                        </button>
                        <button id="btn-reset" class="btn">
                            <span>↺</span> Reset
                        </button>
                        <button id="btn-step" class="btn">
                            <span>▶|</span> Step
                        </button>
                        <button id="btn-new" class="btn btn-new">
                            <span>⚡</span> New Array
                        </button>
                    </div>
                </div>

                <div class="section">
                    <label class="section-label">Array Size</label>
                    <div class="slider-row">
                        <span class="slider-label-small">10</span>
                        <input type="range" id="size-slider" min="10" max="100" value="50">
                        <span class="slider-label-small">100</span>
                    </div>
                    <div class="slider-value" id="size-display">50</div>
                </div>

                <div class="section">
                    <label class="section-label">Visualization Speed</label>
                    <div class="slider-row">
                        <span class="slider-label-small">0x</span>
                        <input type="range" id="speed-slider" min="1" max="100" value="50">
                        <span class="slider-label-small">100x</span>
                    </div>
                    <div class="slider-value" id="speed-display">50x</div>
                </div>

                <div class="section">
                    <label class="section-label">Legend</label>
                    <div class="legend-list">
                        <div class="legend-item">
                            <span class="legend-dot sorted"></span>
                            <span>Sorted</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot comparing"></span>
                            <span>Comparing</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot swapping"></span>
                            <span>Swapping</span>
                        </div>
                        <div class="legend-item">
                            <span class="legend-dot pivot"></span>
                            <span>Pivot</span>
                        </div>
                    </div>
                </div>
            </aside>

            <main class="visualization">
                <div class="viz-header">
                    <div class="viz-algo">
                        Algorithm: <span id="algo-name">Bubble Sort</span>
                    </div>
                    <div id="status-text" class="status-text"></div>
                </div>

                <div class="chart-area">
                    <div id="loading-overlay" class="loading-overlay hidden">
                        <div class="spinner"></div>
                        <span>Computing steps...</span>
                    </div>
                    <div id="bars-container" class="bars-container"></div>
                </div>

                <div class="stats-panel">
                    <div class="stat">
                        <span class="stat-label">Algorithm</span>
                        <span class="stat-value" id="stat-algo">Bubble Sort</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Data Size</span>
                        <span class="stat-value" id="stat-size">50</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Comparisons</span>
                        <span class="stat-value" id="stat-comparisons">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Swaps / Moves</span>
                        <span class="stat-value" id="stat-swaps">0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Progress</span>
                        <span class="stat-value" id="stat-step">0 / 0</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label">Time Elapsed</span>
                        <span class="stat-value" id="stat-time">0.00s</span>
                    </div>
                </div>
            </main>

        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
